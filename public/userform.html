<div class="form-container">
    <h2>Registrer ny bruker eller logg inn som gjest</h2>
    <form id="registerForm">
        <div class="input-group">
            <label for="email">E-postadresse</label>
            <input type="email" id="email" placeholder="E-post" required>
        </div>
        
        <div class="input-group">
            <label for="password">Passord</label>
            <input type="password" id="password" placeholder="Passord" required>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="tos" required> 
            <label for="tos">
                Jeg har lest og godtar
                <a href="/TOS.html" target="_blank">brukervilkår</a>
                og 
                <a href="/PRIVACY.html" target="_blank">personvernerklæring</a>
            </label>
        </div>    

        <button type="submit">Opprett bruker</button>

        <button type="button" id="guestBtn" class="guest-btn">Fortsett som gjest 🙋</button>
        <div id="registerStatus" class="status-message" aria-live="polite"></div>
    </form>
    
    <hr>

    <h2>Logg inn</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="loginEmail">E-postadresse</label>
            <input type="email" id="loginEmail" placeholder="E-post" required>
        </div>
        
        <div class="input-group">
            <label for="loginPassword">Passord</label>
            <input type="password" id="loginPassword" placeholder="Passord" required>
        </div>
        
        <button type="submit">Logg inn</button>
        
        <div id="loginStatus" class="status-message" aria-live="polite"></div>
    </form>
        
    <hr>
    
    <h2>Slett bruker (logg inn for å hente ID)</h2>
    <form id="deleteForm">
        <div class="input-group">
            <label for="deleteId">Bruker ID</label>
            <input type="text" id="deleteId" placeholder="F.eks. 123456" required>
        </div>
        
        <button type="submit">Slett</button>
        <div id="deleteStatus" class="status-message" aria-live="polite"></div>
    </form>
</div>
