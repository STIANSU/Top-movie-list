<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmToppen - Mine filmer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
   <header>
        <h1>Mine filmer 🎬</h1>
        <div id="userInfo" class="user-info">
            <span id="welcomeMessage">Laster inn...</span>
            <span id="userIdDisplay" class="user-id"></span>
        </div>
        <button id="logoutBtn">Logg ut</button>
    </header>

    <main class="split-layout">
        
        <section class="column">
            <h2>Skal se (Watchlist) 🍿</h2>
            
            <form id="watchlistForm" class="mini-form">
                <input type="text" id="watchTitle" placeholder="Filmtittel" required>
                <textarea id="watchComment" rows="2" placeholder="Hvorfor vil du se den? (Valgfritt)"></textarea>
                <button type="submit">Legg til i Skal se</button>
                <div id="watchStatusMsg" class="status-message" aria-live="polite"></div>
            </form>

            <hr>
            <ul id="watchlistList" style="list-style-type: none; padding: 0;"></ul>
        </section>


        <section class="column">
            <h2>Ferdig sett ⭐</h2>
            
            <form id="watchedForm" class="mini-form">
                <input type="text" id="seenTitle" placeholder="Filmtittel" required>
                <input type="number" id="seenRating" min="1" max="10" placeholder="Stjerner (1-10)" required>
                <textarea id="seenComment" rows="2" placeholder="Hva syntes du? (Valgfritt)"></textarea>
                <button type="submit">Legg til som Sett</button>
                <div id="seenStatusMsg" class="status-message" aria-live="polite"></div>
            </form>

            <hr>
            <button id="shareBtn" style="width: 100%; margin-bottom: 15px;">Del listene mine 📤</button>
            <ul id="moviesList" style="list-style-type: none; padding: 0;"></ul>
        </section>

    </main>

    <script type="module" src="movies.mjs"></script>
</body>
</html>
