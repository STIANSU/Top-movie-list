<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmToppen - Mine filmer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <header>
        <h1>Mine filmer 🎬</h1>
        <p id="welcomeMessage">Laster inn...</p>
        <button id="logoutBtn">Logg ut</button>
    </header>

    <main>
        <section>
            <h2>Legg til en ny film</h2>
            <form id="movieForm">
                
                <div class="input-group">
                    <label for="movieTitle">Filmtittel</label>
                    <input type="text" id="movieTitle" required>
                </div>
                
                <div class="input-group">
                    <label for="movieStatus">Hvilken liste?</label>
                    <select id="movieStatus" required>
                        <option value="watched">Har sett den (Ferdig sett)</option>
                        <option value="watchlist">Vil se den (Skal se)</option>
                    </select>
                </div>
                
                <div class="input-group" id="ratingGroup">
                    <label for="movieRating">Antall stjerner (1-10)</label>
                    <input type="number" id="movieRating" min="1" max="10" required>
                </div>
                
                <div class="input-group">
                    <label for="movieComment">Kommentar</label>
                    <textarea id="movieComment" rows="3" placeholder="Hvorfor vil du se den, eller hva syntes du om den?"></textarea>
                </div>
                
                <button type="submit">Lagre film</button>
            </form>
            <div id="movieStatusMsg" aria-live="polite" style="margin-top: 10px; font-weight: bold;"></div>
        </section>

        <hr>

        <section>
            <h2>Skal se (Watchlist) 🍿</h2>
            <ul id="watchlistList" style="list-style-type: none; padding: 0;">
                </ul>
        </section>

        <hr>

        <section>
            <h2>Ferdig sett ⭐</h2>
            <button id="shareBtn" style="margin-bottom: 15px;">Del listene mine 📤</button>
            <ul id="moviesList" style="list-style-type: none; padding: 0;">
                </ul>
        </section>
    </main>

    <script type="module" src="movies.mjs"></script>
</body>
</html>
